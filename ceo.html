<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Access Denied</title>
    <style>
        /* তোমার আগের কোডের ফন্ট সেটআপ */
        @font-face {
            font-family: 'Sabir2';
            src: url('সাবির ২ UNICODE.ttf');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* লোডিং সেকশন */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .meesho-m-loader {
            width: 70px; 
            height: 70px;
        }

        .m-path {
            fill: none;
            stroke-width: 12px;
            stroke-linecap: round;
        }

        .bg-path { stroke: #f3e5f5; }
        .anim-path {
            stroke: #9c27b0;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: draw-and-erase 2.5s ease-in-out infinite;
        }

        @keyframes draw-and-erase {
            0% { stroke-dashoffset: 600; }
            45% { stroke-dashoffset: 0; }
            55% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: -600; }
        }

        /* মূল পেজ স্টাইল */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a002e 0%, #000000 100%);
            font-family: 'Sabir2', 'Hind Siliguri', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #ff4d4d; /* রেডিশ বর্ডার সতর্কতার জন্য */
            backdrop-filter: blur(15px);
            padding: 50px 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.2);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: #eee;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* CEO হাইলাইট */
        .highlight-ceo {
            display: block;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 20%, #ff4d4d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(255, 77, 77, 0.4);
            margin: 10px 0;
        }

        /* ব্যাক বাটন স্টাইল */
        .back-btn {
            background: transparent;
            color: #ff4d4d;
            border: 2px solid #ff4d4d;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: #ff4d4d;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.4);
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <svg class="meesho-m-loader" viewBox="0 0 100 100">
            <path class="m-path bg-path" d="M 15 90 V 40 C 15 10, 40 10, 40 40 V 90 V 40 C 40 10, 65 10, 65 40 V 90" />
            <path class="m-path anim-path" d="M 15 90 V 40 C 15 10, 40 10, 40 40 V 90 V 40 C 40 10, 65 10, 65 40 V 90" />
        </svg>
    </div>

    <div class="card" id="main-card">
        <h2>
            YOU CAN NOT BUY <br>
            <span class="highlight-ceo">CEO</span>
        </h2>
        
        <button onclick="window.history.back()" class="back-btn">
            ← BACK
        </button>
    </div>

    <script>
        window.onload = () => {
            const loader = document.getElementById("loader-wrapper");
            const card = document.getElementById("main-card");

            setTimeout(() => {
                loader.style.opacity = "0";
                loader.style.visibility = "hidden";
                card.classList.add("show");
            }, 1200);
        };
    </script>

</body>
</html>
